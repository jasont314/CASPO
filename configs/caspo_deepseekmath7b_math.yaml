# CASPO on DeepSeekMath-7B-MATH — matches VinePPO setup for direct
# comparison against their published numbers on the 7B scale.
#
# Trainer: FSDP=4 (full_shard) on 4 H100s, vLLM colocated rank-local.
# Default settings target the 4-GPU layout for PPO/GRPO/CASPO/CASPO-frozen-RM.
# VinePPO uses an 8-GPU launcher (see scripts/launch_7b_vineppo.sh) since
# K=9 MC continuations per step boundary at 7B is the heaviest workload.
#
# Effective PPO minibatch is preserved at 64 (paper-faithful):
#   global = world_size × micro_batch_size × grad_accum_steps
#          = 4 × 1 × 16 = 64
# For VinePPO 8-GPU set GRAD_ACCUM_STEPS=8 (8 × 1 × 8 = 64).
model_name_or_path: realtreetune/deepseekmath-7b-sft-MATH-v2
torch_dtype: bfloat16
attn_implementation: flash_attention_3
trust_remote_code: false

dataset_name: DigitalLearningGmbH/MATH-lighteval
dataset_split: train
eval_dataset_name: HuggingFaceH4/MATH-500
eval_split: test
prompt_template: "[MATH_TASK] Problem:\n{query}\n\nSolution:"

max_prompt_len: 1512                  # match VinePPO's max_question_length=1512 (was 1024)
max_response_len: 1024
max_sequence_len: 2499                # match VinePPO 7B (was 2048; 7B context = 4096)

group_size: 8
rollout_temperature: 0.6
rollout_top_p: 0.9
rollout_top_k: -1
value_data_temperature: 1.0          # IPVRM phase-1 uses temp 1.0 for diversity (paper §C)
rollout_backend: vllm
vllm_gpu_memory_utilization: 0.30    # tighter than rho-1B because each rank carries 14 GB ref + 14 GB sharded opt
vllm_tensor_parallel_size: 1
vllm_enforce_eager: false
vllm_max_num_seqs: 128                # exactly matches per-rank workload
                                       # (16 prompts × G=8 = 128 seqs/rank);
                                       # 256 was over-allocating KV slots
                                       # never used.
vllm_max_num_batched_tokens: 16384     # single-prefill chunk for our 16-prompt
                                       # × ~600-token batches; default ~8192
                                       # split into 2 prefills, costing 0.3-0.6s
                                       # of prefill→decode fence overhead.
vllm_kv_cache_dtype: fp8               # halves KV memory; ~3% step-time win
                                       # at disagg TP=4 (smoke 2026-04-27).
                                       # Not the predicted 20% — we are
                                       # decode-latency-bound, not KV-bound.
                                       # Still strictly better than bf16 KV
                                       # at the same util setting; enabled by
                                       # default. Accuracy hit is below seed
                                       # noise on avg@k.
vllm_max_inflight_requests: 1024
vllm_weight_sync_backend: ipc        # FSDP-aware IPC sync (summon_full_params + per-rank push)
prompts_per_step: 64                 # paper-faithful: 64 × G=8 = 512 episodes / outer step (matches VinePPO Table 2 for 7B)

# FSDP — required for 7B full-finetune.
distributed_backend: fsdp
fsdp_sharding_strategy: full_shard
fsdp_use_orig_params: true
fsdp_auto_wrap: true
fsdp_cpu_offload: false              # try false first; flip to true if OOM under pressure
fsdp_forward_prefetch: true
fsdp_limit_all_gathers: true
fsdp_backward_prefetch: backward_pre

# Required for fp32 master + colocated vLLM at 7B: AdamW state (m, v) lives
# on GPU during training, but FSDP summon_full_params at sync time
# materializes ~28 GiB unsharded fp32 on each rank — without freeing the
# 14 GiB AdamW slot for the duration of the summon, we OOM at the step 1→2
# inter-step sync boundary. ~400-500 ms/sync overhead at PCIe Gen5.
offload_optim_during_sync: true

segmentation_mode: latex_aware
step_delimiter: "\n"
min_step_tokens: 4
max_steps_per_response: 64

value_beta: 10.0
value_margin: 5.0
value_lr: 5.0e-7
value_weight_decay: 0.0
value_warmup_steps: 0
value_micro_batch_size: 1
value_grad_accum_steps: 64
value_max_epochs: 3                # paper-faithful 3 epochs over (filtered) data
value_max_steps: 0                 # 0 = use value_max_epochs
value_save_every: 500
value_log_every: 10
value_grad_clip: 1.0
value_data_path: /mnt/nvme_tmp/jason_caspo/deepseekmath7b_math/value_data.pt

prefix_value_path: /mnt/nvme_tmp/jason_caspo/deepseekmath7b_math/value_final
update_value_during_policy: true
online_value_lr: 1.0e-6
use_adb: true
use_dlw: true
adb_dlw_eps: 0.05

gamma: 1.0
standardize_step_advantage: true
standardize_advantage_scope: batch
advantage_clip: 0.0                   # paper-faithful: VinePPO does NOT σ-clip after whitening (was 3.0; truncating ±3σ silently nuked terminal-success advantages)

clip_eps_low: 0.20
clip_eps_high: 0.20
kl_coef: 1.0e-4
kl_estimator: k3

output_dir: /mnt/nvme_tmp/jason_caspo/deepseekmath7b_math
lr: 1.0e-6                        # paper-faithful: VinePPO Table 2 uses lr=1e-6 for DSMath-7B
                                  # (same as Rho-1B). Earlier 2e-6 was a guess; reverted for
                                  # apples-to-apples comparison with the upstream baseline.
weight_decay: 0.0
# warmup_steps: 480 = 0.03 (VinePPO upstream warmup_ratio) × 16000 total
# optimizer steps (1000 outer × 2 epochs × 8 mb-per-epoch). Was 60
# = effectively no warmup (~0.4% of steps); fixed to match upstream.
warmup_steps: 480
grad_clip: 1.0
micro_batch_size: 2               # Apr 2026: mb=2 cuts step time 41s → 30s vs mb=1 (~27% faster)
grad_accum_steps: 8               # FSDP=4: 4 ranks × 2 mb × 8 accum = 64-episode global minibatch
epochs_per_rollout: 2
max_steps: 1000                   # paper-faithful: VinePPO uses num_iterations=1000 for both Rho-1B and 7B.
seed: 0
log_every: 1
save_every: 200
eval_every: 40

reward_workers: 4
gt_cache_max_size: 8192
compile: false                    # known unusable on this stack — see README

device: cuda
use_gradient_checkpointing: true  # required at 7B; activations would otherwise OOM
